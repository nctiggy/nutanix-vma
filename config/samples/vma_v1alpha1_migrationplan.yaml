apiVersion: vma.nutanix.io/v1alpha1
kind: MigrationPlan
metadata:
  name: migrationplan-sample
  namespace: default
spec:
  providerRef:
    name: nutanixprovider-sample
  targetNamespace: kubevirt-vms
  type: cold
  networkMapRef:
    name: networkmap-sample
  storageMapRef:
    name: storagemap-sample
  vms:
    - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      name: "web-server-01"
    - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
      name: "db-server-01"
      hooks:
        - hookRef:
            name: hook-sample
          step: PreHook
  maxInFlight: 1
  targetPowerState: Running
