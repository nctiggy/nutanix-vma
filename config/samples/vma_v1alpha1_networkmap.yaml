apiVersion: vma.nutanix.io/v1alpha1
kind: NetworkMap
metadata:
  name: networkmap-sample
  namespace: default
spec:
  providerRef:
    name: nutanixprovider-sample
  map:
    - source:
        id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name: "vm-network"
      destination:
        type: pod
    - source:
        name: "storage-network"
      destination:
        type: multus
        name: storage-nad
        namespace: default
