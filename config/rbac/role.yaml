---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
  - list
- apiGroups:
  - vma.nutanix.io
  resources:
  - migrationplans
  - nutanixproviders
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - vma.nutanix.io
  resources:
  - migrationplans/status
  - nutanixproviders/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - vma.nutanix.io
  resources:
  - networkmaps
  - storagemaps
  verbs:
  - get
- apiGroups:
  - vma.nutanix.io
  resources:
  - nutanixproviders/finalizers
  verbs:
  - update
