---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - vma.nutanix.io
  resources:
  - nutanixproviders
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - vma.nutanix.io
  resources:
  - nutanixproviders/finalizers
  verbs:
  - update
- apiGroups:
  - vma.nutanix.io
  resources:
  - nutanixproviders/status
  verbs:
  - get
  - patch
  - update
