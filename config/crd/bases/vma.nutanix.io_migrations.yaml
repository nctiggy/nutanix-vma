                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: Phase is the overall migration phase.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                - Cancelled
                type: string
              started:
                description: Started is the timestamp when the migration began.
                format: date-time
                type: string
              vms:
                description: VMs is the per-VM migration status.
                items:
                  description: VMMigrationStatus captures the migration state for
                    a single VM.
                  properties:
                    completed:
                      description: Completed is the timestamp when migration of this
                        VM finished.
                      format: date-time
                      type: string
                    dataVolumeNames:
                      description: |-
                        DataVolumeNames is the list of CDI DataVolume names created for disk import.
                        Used for idempotent reconciliation and cleanup.
                      items:
                        type: string
                      type: array
                    error:
                      description: Error contains any error message from a failed
                        phase.
                      type: string
                    id:
                      description: ID is the UUID of the Nutanix VM.
                      type: string
                    imageUUIDs:
                      description: |-
                        ImageUUIDs is the list of Nutanix image UUIDs created from snapshot disks.
                        Used for idempotent reconciliation and cleanup.
                      items:
                        type: string
                      type: array
                    name:
                      description: Name is the display name of the VM.
                      type: string
                    originalPowerState:
                      description: |-
                        OriginalPowerState records the VM's power state before migration started.
                        Used to restore state on failure.
                      type: string
                    phase:
                      description: Phase is the current phase in the migration pipeline
                        for this VM.
                      enum:
                      - Pending
                      - PreHook
                      - StorePowerState
                      - PowerOff
                      - WaitForPowerOff
                      - CreateSnapshot
                      - ExportDisks
                      - ImportDisks
                      - CreateVM
                      - StartVM
                      - PostHook
                      - Cleanup
                      - BulkCopy
                      - WaitBulkCopy
                      - Precopy
                      - FinalSync
                      - Completed
                      - Failed
                      - Cancelled
                      type: string
                    snapshotUUID:
                      description: |-
                        SnapshotUUID is the UUID of the Nutanix recovery point created for this VM.
                        Used for idempotent reconciliation.
                      type: string
                    started:
                      description: Started is the timestamp when migration of this
                        VM began.
                      format: date-time
                      type: string
                    taskUUID:
                      description: |-
                        TaskUUID is the UUID of the current in-progress Nutanix async task.
                        Used for idempotent reconciliation.
                      type: string
                    warm:
                      description: Warm tracks warm migration-specific progress.
                      properties:
                        baseImageUUIDs:
                          description: BaseImageUUIDs are the images from the baseline
                            snapshot.
                          items:
                            type: string
                          type: array
                        baseSnapshotUUID:
                          description: BaseSnapshotUUID is the snapshot used as CBT
                            baseline for the next round.
                          type: string
                        cumulativeBytes:
                          description: CumulativeBytes is the total bytes transferred
                            across all rounds.
                          format: int64
                          type: integer
                        deltaBytes:
                          description: DeltaBytes is the cumulative delta bytes for
                            the current round.
                          format: int64
                          type: integer
                        deltaDiskIndex:
                          description: DeltaDiskIndex tracks which disk is being processed
                            in the current round.
                          type: integer
                        deltaImageUUIDs:
                          description: DeltaImageUUIDs are the images exported for
                            the current round.
                          items:
                            type: string
                          type: array
                        deltaPodName:
                          description: DeltaPodName is the name of the active delta
                            transfer pod.
                          type: string
                        deltaSnapshotUUID:
                          description: DeltaSnapshotUUID is the snapshot for the current
                            active round.
                          type: string
                        lastDeltaBytes:
                          description: LastDeltaBytes is the size of the last delta
                            transfer.
                          format: int64
                          type: integer
                        lastPrecopyTime:
                          description: LastPrecopyTime is when the last precopy round
                            completed.
                          format: date-time
                          type: string
                        precopyRounds:
                          description: PrecopyRounds is the number of precopy rounds
                            completed.
                          type: integer
                      type: object
                  required:
                  - id
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
